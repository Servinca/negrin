<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Servinca</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* ============================== */
        /* --- Reset y Estilos Base --- */
        /* ============================== */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: #f5f7fa; 
            color: #111827;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        h1, h2, h3 { font-family: 'Poppins', sans-serif; }

        /* ============================== */
        /* --- Contenedor Principal --- */
        /* ============================== */
        .login-wrapper {
            width: 100%;
            max-width: 420px;
        }

        .login-container {
            background: #ffffff;
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.03);
            border: 1px solid #f1f5f9;
            position: relative;
            overflow: hidden;
            text-align: center;
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: -60px;
            right: -60px;
            width: 160px;
            height: 160px;
            background: rgba(59, 130, 246, 0.05);
            border-radius: 50%;
            pointer-events: none;
        }

        /* --- Encabezado --- */
        .logo-circle {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #1e3a8a, #2563eb);
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            margin: 0 auto 20px auto;
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.2);
            position: relative;
            z-index: 2;
        }

        .form-header { margin-bottom: 35px; position: relative; z-index: 2; }
        .form-header h2 {
            font-size: 26px;
            margin-bottom: 8px;
            color: #111827;
            letter-spacing: -0.5px;
        }
        .form-header p { color: #6b7280; font-size: 15px; }

        /* ============================== */
        /* --- Campos del Formulario --- */
        /* ============================== */
        .form-group {
            margin-bottom: 20px;
            text-align: left;
            position: relative;
            z-index: 2;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            color: #94a3b8;
            font-size: 16px;
            transition: color 0.3s ease;
        }

        input {
            width: 100%;
            padding: 14px 18px 14px 45px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            color: #1f2937;
            background-color: #f8fafc;
            transition: all 0.3s ease;
        }

        input::placeholder { color: #94a3b8; }

        input:focus {
            outline: none;
            border-color: #3b82f6;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        input:focus + i, .input-wrapper:focus-within i {
            color: #3b82f6;
        }

        /* ============================== */
        /* --- Botón Principal --- */
        /* ============================== */
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(90deg, #1e3a8a, #2563eb);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.25);
            position: relative;
            z-index: 2;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.35);
            background: linear-gradient(90deg, #1d4ed8, #2563eb);
        }
        
        button:active:not(:disabled) { transform: translateY(0); }
        button:disabled { background: #93c5fd; box-shadow: none; cursor: not-allowed; transform: none; }

        /* Mensaje de error */
        .error-message {
            color: #dc2626;
            background-color: #fef2f2;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
            border: 1px solid #fecaca;
            text-align: left;
        }

    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="login-container">
            
            <div class="logo-circle">
                <i class="fas fa-building"></i>
            </div>

            <div class="form-header">
                <h2>Bienvenido de nuevo</h2>
                <p>Ingresa a tu panel de operaciones</p>
            </div>

            <div id="errorBox" class="error-message">
                <i class="fas fa-exclamation-circle"></i> <span id="errorText">Usuario o contraseña incorrectos.</span>
            </div>
            
            <form id="loginForm">
                
                <div class="form-group">
                    <label for="usuario">Usuario</label>
                    <div class="input-wrapper">
                        <input type="text" id="usuario" placeholder="Tu usuario" required>
                        <i class="fas fa-user"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" placeholder="••••••••" required>
                        <i class="fas fa-lock"></i>
                    </div>
                </div>
                
                <button type="submit" id="btnSubmit">
                    Iniciar Sesión <i class="fas fa-arrow-right"></i>
                </button>
                
            </form>
        </div>
    </div>

    <script>
        // 1. Inicializar Supabase
        const supabaseUrl = 'https://siifkwdmyjycvxaakeqe.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNpaWZrd2RteWp5Y3Z4YWFrZXFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODIyOTIsImV4cCI6MjA5MDQ1ODI5Mn0.uxXL_1BZv0XNC4tqX-lnxYy7VLzwF0qOgJIio08JpOc';
        const cliente = supabase.createClient(supabaseUrl, supabaseKey);

        // 2. Lógica de inicio de sesión manual
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault(); 

            const btnSubmit = document.getElementById('btnSubmit');
            const errorBox = document.getElementById('errorBox');
            const errorText = document.getElementById('errorText');
            const textoOriginal = btnSubmit.innerHTML;
            
            // Estado de carga
            btnSubmit.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Autenticando...';
            btnSubmit.disabled = true;
            errorBox.style.display = 'none';

            // Obtener los datos escritos
            const usuarioInput = document.getElementById('usuario').value;
            const passwordInput = document.getElementById('password').value;

            // 3. Consulta directa a tu tabla "usuarios"
            const { data, error } = await cliente
                .from('usuarios')
                .select('*')
                .eq('usuario', usuarioInput)
                .eq('contrasena', passwordInput);

            // Restaurar botón
            btnSubmit.innerHTML = textoOriginal;
            btnSubmit.disabled = false;

            // 4. Manejar resultado
            if (error) {
                console.error("Error en la consulta:", error);
                errorText.innerText = 'Hubo un error de conexión con la base de datos.';
                errorBox.style.display = 'block';
            } else if (data && data.length > 0) {
                // Si la consulta devuelve al menos una fila, los datos son correctos
                window.location.href = 'directorio.html'; // Cambia index.html por el nombre de tu directorio si es distinto
            } else {
                // Si la consulta devuelve un array vacío (length 0), los datos están mal
                errorText.innerText = 'Usuario o contraseña incorrectos. Verifica tus datos.';
                errorBox.style.display = 'block';
            }
        });
    </script>
</body>
</html>
