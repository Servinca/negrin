<!DOCTYPE html>
<html lang="es">
<head>
    <script>
        if (localStorage.getItem('sesion_activa') !== 'true') { window.location.replace('index.html'); }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Clientes - Servinca</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* ============================== */
        /* --- Estilos Base y Verdes --- */
        /* ============================== */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: #f0fdf4; color: #111827; padding: 30px 20px; min-height: 100vh; line-height: 1.5; }
        h1, h2, h3 { font-family: 'Poppins', sans-serif; }
        .container { max-width: 1200px; margin: 0 auto; }
        .oculto { display: none !important; }

        /* --- Barra de Navegación --- */
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            background: white; padding: 15px 30px; border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 30px; border: 1px solid #dcfce3;
        }
        .nav-links a { text-decoration: none; font-weight: 600; font-size: 15px; margin-right: 25px; color: #64748b; transition: color 0.3s; }
        .nav-links a:hover { color: #10b981; }
        .nav-links a.active { color: #059669; border-bottom: 2px solid #059669; padding-bottom: 5px; }
        .btn-salir { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; padding: 8px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-salir:hover { background: #fee2e2; }

        /* --- VISTA 1: DIRECTORIO --- */
        .header-section {
            text-align: center; background: white; padding: 40px; border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.03); margin-bottom: 40px; border: 1px solid #dcfce3;
        }
        .header-section h1 { font-size: 34px; margin-bottom: 10px; background: linear-gradient(90deg, #065f46, #10b981); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header-section p { color: #6b7280; font-size: 16px; margin-bottom: 25px; }

        .search-container { position: relative; max-width: 500px; margin: 0 auto 15px auto; }
        .search-icon { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: #10b981; font-size: 18px; }
        .search-box { width: 100%; padding: 15px 20px 15px 50px; border: 1px solid #a7f3d0; border-radius: 50px; font-size: 15px; outline: none; transition: 0.3s; }
        .search-box:focus { border-color: #10b981; box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1); }

        /* Controles de Vista y Filtros */
        .filtros-y-vistas { display: flex; justify-content: space-between; align-items: center; max-width: 900px; margin: 0 auto 25px auto; flex-wrap: wrap; gap: 15px; }
        .filtros-container { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;}
        .filtro-select { padding: 10px 15px; border: 1px solid #a7f3d0; border-radius: 50px; font-size: 13px; font-family: 'Inter'; outline: none; color: #4b5563; background: white; transition: 0.3s; cursor: pointer; }
        .filtro-select:focus { border-color: #10b981; box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1); }
        .btn-limpiar { padding: 10px 15px; border: 1px solid #fecaca; border-radius: 50px; font-size: 13px; font-weight: 600; color: #dc2626; background: #fef2f2; cursor: pointer; transition: 0.2s; }
        .btn-limpiar:hover { background: #fee2e2; }

        .view-toggle { display: flex; gap: 5px; background: #d1fae5; padding: 5px; border-radius: 50px; }
        .toggle-btn { padding: 8px 16px; border: none; background: transparent; color: #059669; border-radius: 50px; cursor: pointer; transition: 0.3s; font-size: 14px; }
        .toggle-btn.active { background: white; color: #065f46; box-shadow: 0 2px 5px rgba(0,0,0,0.1); font-weight: 600; }

        .btn-verde {
            display: inline-flex; align-items: center; gap: 8px; padding: 14px 28px;
            background: linear-gradient(90deg, #059669, #10b981); color: white;
            border: none; border-radius: 50px; font-weight: 600; font-size: 15px;
            cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }
        .btn-verde:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(16, 185, 129, 0.4); }

        /* ============================== */
        /* --- Tarjetas Estilo Empresas pero Verdes --- */
        /* ============================== */
        .grid-clientes { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        .lista-clientes { display: block; overflow-x: auto; }

        .card {
            background: #ffffff; border-radius: 16px; padding: 35px; box-shadow: 0 10px 25px rgba(0,0,0,0.03);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: 1px solid #ecfdf5;
            position: relative; overflow: hidden; display: flex; flex-direction: column;
        }
        .card:hover { transform: translateY(-10px) scale(1.02); box-shadow: 0 20px 40px rgba(0,0,0,0.06); border-color: #10b981; }
        .card::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, #065f46, #10b981); transform: scaleX(0); transition: transform 0.3s ease;
        }
        .card:hover::after { transform: scaleX(1); }

        .card-header { margin-bottom: 25px; display: flex; justify-content: space-between; align-items: flex-start; gap: 15px; }
        .card-title { font-size: 21px; color: #111827; margin-bottom: 6px; line-height: 1.2; letter-spacing: -0.3px; }
        .card-desc { font-size: 14px; color: #4b5563; margin-bottom: 20px; flex-grow: 1; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 3; line-clamp: 3; -webkit-box-orient: vertical; }

        .badge { padding: 7px 16px; border-radius: 50px; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; background-color: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }

        /* Detalles de la tarjeta */
        .card-details { border-top: 1px solid #ecfdf5; padding-top: 25px; margin-top: auto; }
        .detail-item { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; font-size: 14px; color: #4b5563; }
        .detail-item i { color: #10b981; width: 22px; text-align: center; font-size: 17px; } 
        .detail-item strong { color: #1f2937; margin-right: 5px; }

        /* Botones de acción */
        .card-actions { display: flex; gap: 12px; margin-top: 25px; padding-top: 20px; border-top: 1px solid #ecfdf5; }
        .action-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; text-align: center; text-decoration: none; display: flex; justify-content: center; align-items: center; gap: 7px; }
        .btn-edit { background-color: #ecfdf5; color: #059669; }
        .btn-edit:hover { background-color: #d1fae5; }
        .btn-delete { background-color: #fef2f2; color: #dc2626; }
        .btn-delete:hover { background-color: #fee2e2; }

        /* --- ESTILOS DE LA VISTA DE TABLA (LISTADO) --- */
        .tabla-clientes { width: 100%; border-collapse: collapse; background: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #dcfce3; }
        .tabla-clientes thead { background: #f0fdf4; }
        .tabla-clientes th { padding: 15px; text-align: left; font-size: 13px; color: #065f46; text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px; border-bottom: 2px solid #a7f3d0;}
        .tabla-clientes td { padding: 15px; border-bottom: 1px solid #f0fdf4; font-size: 14px; color: #4b5563; vertical-align: middle;}
        .tabla-clientes tr:hover { background-color: #f2fbf5; }
        .tabla-acciones-mini { display: flex; gap: 8px; }
        .btn-mini { padding: 8px; border: none; border-radius: 6px; cursor: pointer; transition: 0.2s; color: white;}
        .btn-mini.edit { background: #10b981; }
        .btn-mini.edit:hover { background: #059669; }
        .btn-mini.delete { background: #ef4444; }
        .btn-mini.delete:hover { background: #dc2626; }

        /* --- VISTA 2: FORMULARIO --- */
        .form-container { background: white; padding: 50px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.03); border: 1px solid #dcfce3; max-width: 700px; margin: 0 auto; }
        .btn-volver { display: inline-flex; align-items: center; gap: 8px; color: #64748b; font-weight: 600; cursor: pointer; border: none; background: none; font-size: 15px; margin-bottom: 20px; }
        .btn-volver:hover { color: #059669; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full-width { grid-column: 1 / -1; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 8px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px 15px; border: 1px solid #d1d5db; border-radius: 10px; font-family: 'Inter'; font-size: 14px; background: #f9fafb; outline: none; transition: 0.3s; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #10b981; background: white; box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1); }
        .form-group textarea { resize: vertical; min-height: 100px; }

    </style>
</head>
<body>

    <div class="container">
        <div class="navbar">
            <div class="nav-links">
                <a href="directorio.html"><i class="fas fa-building"></i> Empresas</a>
                <a href="#" class="active"><i class="fas fa-users"></i> Clientes</a>
                <a href="procesos.html"><i class="fas fa-project-diagram"></i> Procesos</a>
                <a href="agenda.html"><i class="fas fa-calendar-alt"></i> Agenda</a>
            </div>
            <button onclick="cerrarSesion()" class="btn-salir"><i class="fas fa-sign-out-alt"></i> Salir</button>
        </div>

        <div id="vista-listado">
            <div class="header-section">
                <h1>Cartera de Clientes</h1>
                <p>Gestiona los datos de contacto, ubicación y otra información de los clientes.</p>
                
                <div class="search-container">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="buscador" class="search-box" placeholder="Buscar cliente, correo, ubicación...">
                </div>

                <div class="filtros-y-vistas">
                    <div class="filtros-container">
                        <select id="filtro-tipo" class="filtro-select">
                            <option value="Todos">Todos los tipos</option>
                            <option value="Persona Natural">Persona Natural</option>
                            <option value="Persona Jurídica">Persona Jurídica</option>
                        </select>
                        
                        <button onclick="limpiarFiltros()" class="btn-limpiar" title="Limpiar Filtros">
                            <i class="fas fa-times"></i> Limpiar
                        </button>
                    </div>

                    <div class="view-toggle">
                        <button id="btn-vista-tarjetas" class="toggle-btn active" onclick="cambiarModoVista('tarjetas')" title="Ver en Tarjetas"><i class="fas fa-th-large"></i></button>
                        <button id="btn-vista-lista" class="toggle-btn" onclick="cambiarModoVista('lista')" title="Ver en Lista"><i class="fas fa-list"></i></button>
                    </div>
                </div>
                
                <button onclick="prepararNuevo()" class="btn-verde">
                    <i class="fas fa-user-plus"></i> Registrar Nuevo Cliente
                </button>
            </div>

            <div class="grid-clientes" id="gridClientes">
            </div>
        </div>

        <div id="vista-formulario" class="oculto">
            <div class="form-container">
                <button onclick="mostrarListado()" class="btn-volver"><i class="fas fa-arrow-left"></i> Volver al listado</button>
                
                <h2 id="form-titulo" style="color: #065f46; font-size: 28px; margin-bottom: 25px; text-align: center;">Registrar Cliente</h2>
                
                <form id="clienteForm" class="form-grid">
                    <div class="form-group full-width">
                        <label>Nombre Completo / Razón Social</label>
                        <input type="text" id="nombre">
                    </div>
                    
                    <div class="form-group">
                        <label>Tipo de Cliente</label>
                        <select id="tipo">
                            <option value="" disabled selected>Seleccione...</option>
                            <option value="Persona Natural">Persona Natural</option>
                            <option value="Persona Jurídica">Persona Jurídica</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Ubicación (Ciudad/Estado)</label>
                        <input type="text" id="ubicacion">
                    </div>

                    <div class="form-group full-width">
                        <label>Dirección Física Exacta</label>
                        <input type="text" id="direccion">
                    </div>

                    <div class="form-group">
                        <label>Correo Electrónico</label>
                        <input type="email" id="correo">
                    </div>

                    <div class="form-group">
                        <label>Número Telefónico</label>
                        <input type="tel" id="telefono">
                    </div>

                    <div class="form-group full-width">
                        <label>Otro (Dato Adicional)</label>
                        <input type="text" id="otro">
                    </div>

                    <div class="form-group full-width">
                        <label>Descripción / Notas Adicionales</label>
                        <textarea id="descripcion"></textarea>
                    </div>
                    
                    <div class="form-group full-width" style="margin-top: 10px;">
                        <button type="submit" id="btnSubmitForm" class="btn-verde" style="width: 100%; justify-content: center; padding: 16px;">
                            <i class="fas fa-save"></i> <span id="btnSubmitText">Guardar Cliente</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>

    </div>

    <script>
        const supabaseUrl = 'https://siifkwdmyjycvxaakeqe.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNpaWZrd2RteWp5Y3Z4YWFrZXFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODIyOTIsImV4cCI6MjA5MDQ1ODI5Mn0.uxXL_1BZv0XNC4tqX-lnxYy7VLzwF0qOgJIio08JpOc';
        const clienteSupabase = supabase.createClient(supabaseUrl, supabaseKey);

        let bdClientes = [];
        let idClienteEditando = null; 
        let modoVista = 'tarjetas'; // Por defecto empieza en tarjetas

        // --- FUNCIONES VISUALES Y VISTAS ---
        function cambiarModoVista(modo) {
            modoVista = modo;
            
            document.getElementById('btn-vista-tarjetas').classList.toggle('active', modo === 'tarjetas');
            document.getElementById('btn-vista-lista').classList.toggle('active', modo === 'lista');
            
            const grid = document.getElementById('gridClientes');
            grid.className = modo === 'tarjetas' ? 'grid-clientes' : 'lista-clientes';

            aplicarFiltros(); 
        }

        function mostrarFormulario() {
            document.getElementById('vista-listado').classList.add('oculto');
            document.getElementById('vista-formulario').classList.remove('oculto');
        }

        function mostrarListado() {
            document.getElementById('vista-formulario').classList.add('oculto');
            document.getElementById('vista-listado').classList.remove('oculto');
        }

        function prepararNuevo() {
            idClienteEditando = null;
            document.getElementById('clienteForm').reset();
            document.getElementById('form-titulo').innerText = 'Registrar Cliente';
            document.getElementById('btnSubmitText').innerText = 'Guardar Cliente';
            mostrarFormulario();
        }

        function editarCliente(id) {
            idClienteEditando = id;
            const cliente = bdClientes.find(c => c.id === id);
            
            document.getElementById('nombre').value = cliente.nombre || '';
            document.getElementById('tipo').value = cliente.tipo || '';
            document.getElementById('ubicacion').value = cliente.ubicacion || '';
            document.getElementById('direccion').value = cliente.direccion || '';
            document.getElementById('correo').value = cliente.correo || '';
            document.getElementById('telefono').value = cliente.telefono || '';
            document.getElementById('otro').value = cliente.otro || '';
            document.getElementById('descripcion').value = cliente.descripcion || '';

            document.getElementById('form-titulo').innerText = 'Editar Cliente';
            document.getElementById('btnSubmitText').innerText = 'Actualizar Cambios';
            mostrarFormulario();
        }

        function cerrarSesion() {
            localStorage.removeItem('sesion_activa');
            window.location.href = 'index.html';
        }

        // --- LÓGICA DE DATOS Y TARJETAS/TABLA ---
        async function cargarClientes() {
            const { data, error } = await clienteSupabase.from('clientes').select('*').order('created_at', { ascending: false });
            if (!error) {
                bdClientes = data;
                aplicarFiltros(); 
            } else {
                console.error(error);
            }
        }

        function renderizarGrid(clientes) {
            const contenedor = document.getElementById('gridClientes');
            contenedor.innerHTML = '';

            if(clientes.length === 0) {
                contenedor.innerHTML = '<div class="empty-state" style="grid-column: 1/-1; text-align: center; padding: 60px; color: #6b7280; border: 2px dashed #a7f3d0; border-radius: 16px;"><i class="fas fa-user-times" style="font-size: 50px; color: #a7f3d0; margin-bottom: 15px;"></i><p>No hay clientes para mostrar.</p></div>';
                return;
            }

            // MODO LISTA / TABLA
            if (modoVista === 'lista') {
                let tablaHTML = `
                    <table class="tabla-clientes">
                        <thead>
                            <tr>
                                <th>Nombre / Tipo</th>
                                <th>Ubicación</th>
                                <th>Correo</th>
                                <th>Teléfono</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                clientes.forEach((c) => {
                    tablaHTML += `
                        <tr>
                            <td>
                                <strong style="color:#111827; font-size:15px;">${c.nombre || 'Sin nombre'}</strong><br>
                                <span style="font-size: 12px; color: #6b7280;"><i class="fas fa-user-tag"></i> ${c.tipo || '-'}</span>
                            </td>
                            <td>${c.ubicacion || '-'}</td>
                            <td>${c.correo || '-'}</td>
                            <td>${c.telefono || '-'}</td>
                            <td>
                                <div class="tabla-acciones-mini">
                                    <button onclick="editarCliente(${c.id})" class="btn-mini edit" title="Editar"><i class="fas fa-edit"></i></button>
                                    <button onclick="eliminarCliente(${c.id}, '${c.nombre}')" class="btn-mini delete" title="Eliminar"><i class="fas fa-trash-alt"></i></button>
                                </div>
                            </td>
                        </tr>
                    `;
                });

                tablaHTML += `</tbody></table>`;
                contenedor.innerHTML = tablaHTML;
            } 
            // MODO TARJETAS
            else {
                clientes.forEach((c) => {
                    const card = document.createElement('div');
                    card.className = 'card';

                    card.innerHTML = `
                        <div class="card-header">
                            <div>
                                <h3 class="card-title">${c.nombre || 'Sin Nombre'}</h3>
                                <div class="detail-item"><i class="fas fa-map-marker-alt"></i> ${c.ubicacion || '-'}</div>
                            </div>
                            <span class="badge"><i class="fas fa-user-tag"></i> ${c.tipo || '-'}</span>
                        </div>
                        
                        <p class="card-desc">${c.descripcion || 'Sin descripción adicional disponible.'}</p>
                        
                        <div class="card-details">
                            <div class="detail-item">
                                <i class="fas fa-compass"></i>
                                <div><strong>Dirección:</strong> ${c.direccion || '-'}</div>
                            </div>
                            <div class="detail-item">
                                <i class="fas fa-envelope"></i>
                                <div><strong>Correo:</strong> ${c.correo || '-'}</div>
                            </div>
                            <div class="detail-item">
                                <i class="fas fa-phone-alt"></i>
                                <div><strong>Teléfono:</strong> ${c.telefono || '-'}</div>
                            </div>
                            <div class="detail-item">
                                <i class="fas fa-info-circle"></i>
                                <div><strong>Otro:</strong> ${c.otro || '-'}</div>
                            </div>
                        </div>

                        <div class="card-actions">
                            <button onclick="editarCliente(${c.id})" class="action-btn btn-edit">
                                <i class="fas fa-edit"></i> Editar
                            </button>
                            <button onclick="eliminarCliente(${c.id}, '${c.nombre}')" class="action-btn btn-delete">
                                <i class="fas fa-trash-alt"></i> Eliminar
                            </button>
                        </div>
                    `;
                    contenedor.appendChild(card);
                });
            }
        }

        async function eliminarCliente(id, nombre) {
            if(confirm(`¿Estás seguro de que deseas eliminar a "${nombre}"? Esta acción no se puede deshacer.`)) {
                const { error } = await clienteSupabase.from('clientes').delete().eq('id', id);
                if(error) alert('Error al eliminar');
                else {
                    bdClientes = bdClientes.filter(c => c.id !== id);
                    aplicarFiltros(); 
                }
            }
        }

        // --- SISTEMA DE FILTROS ---
        function aplicarFiltros() {
            const textoBusqueda = document.getElementById('buscador').value.toLowerCase();
            const filtroTipo = document.getElementById('filtro-tipo').value;

            const filtrados = bdClientes.filter(c => {
                const coincideTexto = (c.nombre && c.nombre.toLowerCase().includes(textoBusqueda)) || 
                                      (c.correo && c.correo.toLowerCase().includes(textoBusqueda)) ||
                                      (c.otro && c.otro.toLowerCase().includes(textoBusqueda)) ||
                                      (c.ubicacion && c.ubicacion.toLowerCase().includes(textoBusqueda));
                
                const coincideTipo = (filtroTipo === 'Todos') || (c.tipo === filtroTipo);

                return coincideTexto && coincideTipo;
            });

            renderizarGrid(filtrados);
        }

        function limpiarFiltros() {
            document.getElementById('buscador').value = '';
            document.getElementById('filtro-tipo').value = 'Todos';
            aplicarFiltros();
        }

        document.getElementById('buscador').addEventListener('input', aplicarFiltros);
        document.getElementById('filtro-tipo').addEventListener('change', aplicarFiltros);

        // --- FORMULARIO (GUARDAR / ACTUALIZAR) ---
        document.getElementById('clienteForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btnSubmit = document.getElementById('btnSubmitForm');
            const iconHTML = '<i class="fas fa-save"></i> ';
            const btnTextSpan = document.getElementById('btnSubmitText');
            const textoOriginal = btnTextSpan.innerText;
            
            btnSubmit.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Procesando...';
            btnSubmit.disabled = true;

            const datos = {
                nombre: document.getElementById('nombre').value,
                tipo: document.getElementById('tipo').value,
                ubicacion: document.getElementById('ubicacion').value,
                direccion: document.getElementById('direccion').value,
                correo: document.getElementById('correo').value,
                telefono: document.getElementById('telefono').value,
                otro: document.getElementById('otro').value, 
                descripcion: document.getElementById('descripcion').value
            };

            let operacionError;

            if (idClienteEditando) {
                const { error } = await clienteSupabase.from('clientes').update(datos).eq('id', idClienteEditando);
                operacionError = error;
            } else {
                const { error } = await clienteSupabase.from('clientes').insert([datos]);
                operacionError = error;
            }
            
            btnSubmit.innerHTML = iconHTML + '<span id="btnSubmitText">' + textoOriginal + '</span>';
            btnSubmit.disabled = false;

            if (operacionError) {
                alert('Error al procesar: ' + operacionError.message);
            } else {
                alert(idClienteEditando ? '¡Cliente actualizado con éxito!' : '¡Cliente guardado con éxito!');
                mostrarListado();
                cargarClientes(); 
            }
        });

        cargarClientes();
    </script>
</body>
</html>
