<!DOCTYPE html>
<html lang="es">
<head>
    <script>
    // 1. Revisamos si la llave de sesión existe en el navegador
    if (localStorage.getItem('sesion_activa') !== 'true') {
        // 2. Si no existe, lo mandamos directo al login (index.html)
        // Usamos replace para que el usuario no pueda darle "atrás" en el navegador y entrar
        window.location.replace('index.html');
    }
</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Empresa - Servinca</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background-color: #eef2f6; color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        
        .form-container { background-color: #ffffff; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 650px; position: relative; }
        
        .btn-volver { position: absolute; top: 20px; left: 20px; color: #64748b; text-decoration: none; font-size: 14px; font-weight: 500; }
        .btn-volver:hover { color: #2563eb; }

        .form-header { text-align: center; margin-bottom: 30px; margin-top: 10px;}
        .form-header h2 { color: #1e3a8a; font-size: 26px; font-weight: 600; margin-bottom: 8px; }
        .form-header p { color: #6b7280; font-size: 15px; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { display: flex; flex-direction: column; }
        .full-width { grid-column: 1 / -1; }

        label { font-size: 14px; font-weight: 500; color: #374151; margin-bottom: 8px; }
        input, select, textarea { width: 100%; padding: 12px 15px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; font-family: 'Inter', sans-serif; transition: all 0.3s ease; background-color: #f9fafb; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #3b82f6; background-color: #ffffff; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15); }
        textarea { resize: vertical; min-height: 100px; }

        button { width: 100%; padding: 15px; background-color: #f59e0b; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background-color 0.3s ease, transform 0.1s ease; margin-top: 10px; }
        button:hover { background-color: #d97706; }
        button:active { transform: scale(0.98); }

        #loadingOverlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: 18px; font-weight: 600; color: #3b82f6; z-index: 10; }

        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="form-container">
        <div id="loadingOverlay"><i class="fas fa-spinner fa-spin" style="margin-right: 10px;"></i> Cargando datos...</div>

        <a href="directorio.html" class="btn-volver"><i class="fas fa-arrow-left"></i> Volver</a>

        <div class="form-header">
            <h2>Modificar Registro</h2>
            <p>Actualiza la información de esta empresa en el sistema.</p>
        </div>
        
        <form id="editForm" class="form-grid">
            <div class="form-group full-width">
                <label for="nombre">Nombre de la Empresa</label>
                <input type="text" id="nombre" required>
            </div>
            
            <div class="form-group">
                <label for="tipo">Clasificación</label>
                <select id="tipo" required>
                    <option value="" disabled>Seleccione un tipo...</option>
                    <option value="Fabricante">Fabricante</option>
                    <option value="Distribuidora">Distribuidora</option>
                    <option value="Ventas">Ventas</option>
                </select>
            </div>

            <div class="form-group">
                <label for="ubicacion">Ubicación (Ciudad/Estado)</label>
                <input type="text" id="ubicacion">
            </div>
            
            <div class="form-group full-width">
                <label for="direccion">Dirección Física Exacta</label>
                <input type="text" id="direccion">
            </div>

            <div class="form-group">
                <label for="correo">Correo Electrónico</label>
                <input type="email" id="correo">
            </div>

            <div class="form-group">
                <label for="telefono">Número Telefónico</label>
                <input type="text" id="telefono">
            </div>

            <div class="form-group full-width">
                <label for="descripcion">Descripción / Notas Adicionales</label>
                <textarea id="descripcion"></textarea>
            </div>
            
            <div class="form-group full-width">
                <button type="submit"><i class="fas fa-save"></i> Guardar Cambios</button>
            </div>
        </form>
    </div>

    <script>
        const supabaseUrl = 'https://siifkwdmyjycvxaakeqe.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNpaWZrd2RteWp5Y3Z4YWFrZXFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODIyOTIsImV4cCI6MjA5MDQ1ODI5Mn0.uxXL_1BZv0XNC4tqX-lnxYy7VLzwF0qOgJIio08JpOc';
        const cliente = supabase.createClient(supabaseUrl, supabaseKey);

        // 1. Obtener el ID de la empresa desde la URL (ej: editar.html?id=5)
        const urlParams = new URLSearchParams(window.location.search);
        const empresaId = urlParams.get('id');

        // 2. Función para cargar los datos apenas abre la página
        async function cargarDatosEmpresa() {
            if (!empresaId) {
                alert('No se especificó ninguna empresa para editar.');
                window.location.href = 'directorio.html'; // Redirigir si no hay ID (Cámbialo al nombre de tu archivo principal)
                return;
            }

            const { data, error } = await cliente
                .from('empresas')
                .select('*')
                .eq('id', empresaId)
                .single(); // Pedimos específicamente 1 solo registro

            if (error) {
                alert('Error al obtener los datos: ' + error.message);
                return;
            }

            // 3. Rellenar los inputs con los datos de Supabase
            document.getElementById('nombre').value = data.nombre;
            document.getElementById('tipo').value = data.tipo;
            document.getElementById('ubicacion').value = data.ubicacion || '';
            document.getElementById('direccion').value = data.direccion || '';
            document.getElementById('correo').value = data.correo || '';
            document.getElementById('telefono').value = data.telefono || '';
            document.getElementById('descripcion').value = data.descripcion || '';

            // Quitar la pantalla de carga visual
            document.getElementById('loadingOverlay').style.display = 'none';
        }

        // 4. Lógica para guardar las modificaciones
        document.getElementById('editForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            // Obtenemos los valores de los inputs
            const datosActualizados = {
                nombre: document.getElementById('nombre').value,
                tipo: document.getElementById('tipo').value,
                ubicacion: document.getElementById('ubicacion').value,
                direccion: document.getElementById('direccion').value,
                correo: document.getElementById('correo').value,
                telefono: document.getElementById('telefono').value,
                descripcion: document.getElementById('descripcion').value
            };

            // Enviamos el "Update" a Supabase
            const { error } = await cliente
                .from('empresas')
                .update(datosActualizados)
                .eq('id', empresaId);

            if (error) {
                alert('Hubo un error al guardar los cambios: ' + error.message);
            } else {
                alert('¡Datos actualizados con éxito!');
                window.location.href = 'directorio.html'; // Devuelve al directorio al terminar (Asegúrate de cambiar esto si tu archivo principal se llama distinto)
            }
        });

        // Iniciar todo
        cargarDatosEmpresa();
    </script>
</body>
</html>
