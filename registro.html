
<!DOCTYPE html>
<html lang="es">
<head>
    <script>
    // 1. Revisamos si la llave de sesión existe en el navegador
    if (localStorage.getItem('sesion_activa') !== 'true') {
        // 2. Si no existe, lo mandamos directo al login (index.html)
        // Usamos replace para que el usuario no pueda darle "atrás" en el navegador y entrar
        window.location.replace('index.html');
    }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Empresas - Servinca</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* ============================== */
        /* --- Reset y Estilos Base --- */
        /* ============================== */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: #f5f7fa; 
            color: #111827;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
            line-height: 1.5;
        }

        h1, h2, h3 { font-family: 'Poppins', sans-serif; font-weight: 700; }

        /* ============================== */
        /* --- Contenedor Principal --- */
        /* ============================== */
        .form-container {
            background: #ffffff;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.03);
            border: 1px solid #f1f5f9;
            width: 100%;
            max-width: 750px;
            position: relative;
            overflow: hidden;
        }

        /* Elemento decorativo de fondo */
        .form-container::before {
            content: '';
            position: absolute;
            top: -60px;
            right: -60px;
            width: 160px;
            height: 160px;
            background: rgba(59, 130, 246, 0.05);
            border-radius: 50%;
            pointer-events: none;
        }

        /* --- Botón Volver --- */
        .btn-volver {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #64748b;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 25px;
            transition: all 0.3s ease;
            position: relative;
            z-index: 2;
        }
        .btn-volver i { transition: transform 0.3s ease; }
        .btn-volver:hover { color: #2563eb; }
        .btn-volver:hover i { transform: translateX(-4px); }

        /* --- Encabezado del Formulario --- */
        .form-header { text-align: center; margin-bottom: 40px; position: relative; z-index: 2; }
        .form-header h2 {
            font-size: 32px;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #1e3a8a, #2563eb);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }
        .form-header p { color: #6b7280; font-size: 16px; }

        /* ============================== */
        /* --- Cuadrícula y Campos --- */
        /* ============================== */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; position: relative; z-index: 2; }
        .form-group { display: flex; flex-direction: column; }
        .full-width { grid-column: 1 / -1; }

        label {
            font-size: 14px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 10px;
            letter-spacing: 0.3px;
        }

        input, select, textarea {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            color: #1f2937;
            background-color: #f8fafc;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        input::placeholder, select::placeholder, textarea::placeholder { color: #94a3b8; }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #3b82f6;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
            transform: translateY(-1px);
        }

        textarea { resize: vertical; min-height: 120px; line-height: 1.6; }

        /* ============================== */
        /* --- Botón Principal --- */
        /* ============================== */
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(90deg, #1e3a8a, #2563eb);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.25);
        }

        button:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.35);
            background: linear-gradient(90deg, #1d4ed8, #2563eb);
        }
        
        button:active:not(:disabled) { transform: translateY(0); }

        button:disabled { background: #93c5fd; box-shadow: none; cursor: not-allowed; transform: none; }

        /* Adaptabilidad Móvil */
        @media (max-width: 650px) {
            .form-container { padding: 40px 25px; }
            .form-grid { grid-template-columns: 1fr; gap: 20px; }
            .form-header h2 { font-size: 28px; }
        }
    </style>
</head>
<body>

    <div class="form-container">
        <a href="directorio.html" class="btn-volver">
            <i class="fas fa-arrow-left"></i> Volver al Directorio
        </a>

        <div class="form-header">
            <h2>Nuevo Registro</h2>
            <p>Ingresa los datos para añadir una empresa al sistema.</p>
        </div>
        
        <form id="empresaForm" class="form-grid">
            
            <div class="form-group full-width">
                <label for="nombre">Nombre de la Empresa</label>
                <input type="text" id="nombre">
            </div>
            
            <div class="form-group">
                <label for="tipo">Clasificación</label>
                <select id="tipo">
                    <option value="" disabled selected>Seleccione un tipo...</option>
                    <option value="Fabricante">Fabricante</option>
                    <option value="Distribuidora">Distribuidora</option>
                    <option value="Ventas">Ventas</option>
                </select>
            </div>

            <div class="form-group">
                <label for="ubicacion">Ubicación (Ciudad/Estado)</label>
                <input type="text" id="ubicacion">
            </div>
            
            <div class="form-group full-width">
                <label for="direccion">Dirección Física Exacta</label>
                <input type="text" id="direccion">
            </div>

            <div class="form-group">
                <label for="correo">Correo Electrónico</label>
                <input type="email" id="correo">
            </div>

            <div class="form-group">
                <label for="telefono">Número Telefónico</label>
                <input type="tel" id="telefono">
            </div>

            <div class="form-group full-width">
                <label for="otro">Otro (Dato Adicional)</label>
                <input type="text" id="otro" placeholder="Especificar información adicional...">
            </div>

            <div class="form-group full-width">
                <label for="descripcion">Descripción / Notas Adicionales (Opcional)</label>
                <textarea id="descripcion"></textarea>
            </div>
            
            <div class="form-group full-width">
                <button type="submit" id="btnSubmit">
                    <i class="fas fa-save"></i> Guardar Registro Empresarial
                </button>
            </div>
            
        </form>
    </div>

    <script>
        // 1. Inicializar Supabase
        const supabaseUrl = 'https://siifkwdmyjycvxaakeqe.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNpaWZrd2RteWp5Y3Z4YWFrZXFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODIyOTIsImV4cCI6MjA5MDQ1ODI5Mn0.uxXL_1BZv0XNC4tqX-lnxYy7VLzwF0qOgJIio08JpOc';
        const cliente = supabase.createClient(supabaseUrl, supabaseKey);

        // 2. Capturar el evento de envío del formulario
        document.getElementById('empresaForm').addEventListener('submit', async function(e) {
            e.preventDefault(); 

            const btnSubmit = document.getElementById('btnSubmit');
            const textoOriginal = btnSubmit.innerHTML;
            
            btnSubmit.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Guardando datos...';
            btnSubmit.disabled = true;

            // 3. Obtener los valores 
            const nombre = document.getElementById('nombre').value;
            const descripcion = document.getElementById('descripcion').value;
            const ubicacion = document.getElementById('ubicacion').value;
            const tipo = document.getElementById('tipo').value;
            const direccion = document.getElementById('direccion').value;
            const correo = document.getElementById('correo').value;
            const telefono = document.getElementById('telefono').value;
            const otro = document.getElementById('otro').value;

            // 4. Insertar en Supabase
            const { error } = await cliente
                .from('empresas')
                .insert([{ nombre, descripcion, ubicacion, tipo, direccion, correo, telefono, otro }]);

            // Restaurar botón
            btnSubmit.innerHTML = textoOriginal;
            btnSubmit.disabled = false;

            // 5. Manejar respuesta
            if (error) {
                console.error('Error al guardar:', error);
                alert('Hubo un error al guardar la empresa: ' + error.message);
            } else {
                alert('¡Empresa registrada satisfactoriamente!');
                document.getElementById('empresaForm').reset(); 
            }
        });
    </script>
</body>
</html>
